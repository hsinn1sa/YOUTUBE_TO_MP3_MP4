name: Auto Build and Release

on:
  push:
    tags:
      - 'v*' # 🎯 只要你在 VS 推送以 v 開頭的標籤（如 v1.0.3），機器人就啟動！

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 🛠️ 配合你專案的 .NET 版本

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Publish
      run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./yt連結轉mp3 4/bin/Release/net8.0-windows/win-x64/publish/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
